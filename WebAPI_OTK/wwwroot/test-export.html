<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Тест экспорта</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        .test-section {
            margin: 20px 0;
            padding: 15px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }
        button {
            padding: 10px 20px;
            margin: 5px;
            cursor: pointer;
            border: none;
            border-radius: 4px;
            font-size: 14px;
        }
        .btn-success { background-color: #28a745; color: white; }
        .btn-danger { background-color: #dc3545; color: white; }
        .btn-primary { background-color: #007bff; color: white; }
        .log {
            background-color: #f5f5f5;
            padding: 10px;
            margin-top: 10px;
            border-radius: 4px;
            font-family: monospace;
            font-size: 12px;
            max-height: 300px;
            overflow-y: auto;
        }
    </style>
</head>
<body>
    <h1>Тест функционала экспорта</h1>
    
    <div class="test-section">
        <h2>Экспорт каталога ДСЕ</h2>
        <button class="btn-success" onclick="testDCEExcel()">Экспорт в Excel</button>
        <button class="btn-danger" onclick="testDCEPDF()">Экспорт в PDF</button>
    </div>
    
    <div class="test-section">
        <h2>Экспорт маршрутных листов</h2>
        <button class="btn-success" onclick="testMLExcel()">Экспорт в Excel</button>
        <button class="btn-danger" onclick="testMLPDF()">Экспорт в PDF</button>
    </div>
    
    <div class="test-section">
        <h2>Экспорт премиальных коэффициентов</h2>
        <button class="btn-success" onclick="testCoefExcel()">Экспорт в Excel</button>
        <button class="btn-danger" onclick="testCoefPDF()">Экспорт в PDF</button>
    </div>
    
    <div class="test-section">
        <h2>Лог</h2>
        <div id="log" class="log"></div>
    </div>

    <script src="/js/api.js"></script>
    <script>
        function log(message) {
            const logDiv = document.getElementById('log');
            const timestamp = new Date().toLocaleTimeString();
            logDiv.innerHTML += `[${timestamp}] ${message}<br>`;
            logDiv.scrollTop = logDiv.scrollHeight;
            console.log(message);
        }

        // Проверка доступности exportApi
        if (typeof exportApi !== 'undefined') {
            log('✓ exportApi загружен успешно');
            log('Доступные методы: ' + Object.keys(exportApi).join(', '));
        } else {
            log('✗ ОШИБКА: exportApi не определен!');
        }

        function testDCEExcel() {
            log('Тест: Экспорт ДСЕ в Excel');
            try {
                exportApi.exportDCEToExcel(null);
                log('✓ Запрос отправлен');
            } catch (error) {
                log('✗ Ошибка: ' + error.message);
            }
        }

        function testDCEPDF() {
            log('Тест: Экспорт ДСЕ в PDF');
            try {
                exportApi.exportDCEToPDF(null);
                log('✓ Запрос отправлен');
            } catch (error) {
                log('✗ Ошибка: ' + error.message);
            }
        }

        function testMLExcel() {
            log('Тест: Экспорт МЛ в Excel');
            try {
                exportApi.exportRouteListsToExcel({});
                log('✓ Запрос отправлен');
            } catch (error) {
                log('✗ Ошибка: ' + error.message);
            }
        }

        function testMLPDF() {
            log('Тест: Экспорт МЛ в PDF');
            try {
                exportApi.exportRouteListsToPDF({});
                log('✓ Запрос отправлен');
            } catch (error) {
                log('✗ Ошибка: ' + error.message);
            }
        }

        function testCoefExcel() {
            log('Тест: Экспорт коэффициентов в Excel');
            try {
                exportApi.exportCoefficientsToExcel(null);
                log('✓ Запрос отправлен');
            } catch (error) {
                log('✗ Ошибка: ' + error.message);
            }
        }

        function testCoefPDF() {
            log('Тест: Экспорт коэффициентов в PDF');
            try {
                exportApi.exportCoefficientsToPDF(null);
                log('✓ Запрос отправлен');
            } catch (error) {
                log('✗ Ошибка: ' + error.message);
            }
        }
    </script>
</body>
</html>
